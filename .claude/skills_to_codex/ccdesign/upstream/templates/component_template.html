<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{AMOTP}}_{{name}} — Design System Component</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../03_vars/11_bootstrap_official/css/variables.css">
  <style>
    /* elem-box 카탈로그 스타일 */
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Pretendard', sans-serif; padding: 2rem; }
    h2 { color: #fff; margin-bottom: 1.5rem; }
    .section-title { color: #adb5bd; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin: 2rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #2a2a4a; }
    .elem-box { background: #ffffff; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .elem-box-wide { max-width: 600px; }
    .elem-id { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .elem-id span:first-child { font-family: 'Consolas', monospace; font-size: 0.7rem; color: #4a9eff; font-weight: 600; }
    .elem-name { font-size: 0.65rem; color: #adb5bd; }
    .elem-deps { font-family: 'Consolas', monospace; font-size: 0.55rem; color: #adb5bd; background: #f8f9fa; padding: 2px 6px; border-radius: 3px; margin-bottom: 0.5rem; display: inline-block; }
    .elem-preview { margin-bottom: 0.75rem; }
    .elem-code { background: #f8f9fa; border-radius: 6px; padding: 0.75rem; font-family: 'Consolas', monospace; font-size: 0.7rem; color: #333; white-space: pre-wrap; cursor: pointer; position: relative; max-height: 120px; overflow-y: auto; }
    .elem-code:hover::after { content: 'Click to copy'; position: absolute; top: 4px; right: 8px; font-size: 0.6rem; color: #4a9eff; }
    .comp-count { text-align: center; color: #adb5bd; font-size: 0.7rem; margin-top: 2rem; }
  </style>
</head>
<body>

<h2>{{AMOTP}} {{Name}} <small class="text-secondary" style="font-size:0.6em">component catalog</small></h2>

<!-- 섹션 제목 예시 -->
<div class="section-title">기본 ({{AMOTP}}-001 ~ 001)</div>

<!-- elem-box 예시 -->
<div class="elem-box elem-box-wide">
  <div class="elem-id"><span>{{AMOTP}}-001</span><span class="elem-name">Default</span></div>
  <!-- M/O/T/P만: <div class="elem-deps">A101 Button</div> -->
  <div class="elem-preview">
    <!-- 컴포넌트 렌더링 -->
  </div>
  <div class="elem-code" onclick="copyCode(this)">
<!-- HTML 코드 -->
  </div>
</div>

<div class="comp-count">Total: 1 elements</div>

<script>
function copyCode(el){navigator.clipboard.writeText(el.textContent.trim());el.style.outline='2px solid #4a9eff';setTimeout(()=>el.style.outline='',600)}
document.addEventListener('DOMContentLoaded',()=>{document.querySelector('.comp-count').textContent='Total: '+document.querySelectorAll('.elem-box').length+' elements'})
</script>
</body>
</html>
